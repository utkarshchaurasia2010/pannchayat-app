<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village Issue Tracker</title>
    <style>
        /* Simple styling to keep things clean */
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        .hidden { display: none; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
    </style>
</head>
<body>

    <h2>Login to Report</h2>

    <div id="phone-screen">
        <label>Enter Phone Number (with +91)</label>
        <input type="text" id="phone-number" value="+91" placeholder="+919876543210">
        <button id="send-code-btn">Send OTP</button>
        <div id="recaptcha-container"></div> 
    </div>

    <div id="otp-screen" class="hidden">
        <label>Enter the 6-digit code</label>
        <input type="text" id="otp-code" placeholder="123456">
        <button id="verify-code-btn">Verify & Login</button>
    </div>

    <div id="app-screen" class="hidden">
        <h3>Welcome!</h3>
        <p>You are logged in as: <strong id="user-display"></strong></p>
        </div>

    <script async function submitIssue() {
    const statusMsg = document.getElementById('status-msg');
    statusMsg.innerText = "Submitting...";

    const payload = {
        phone: window.currentUserPhone, // This comes from the Firebase login
        name: document.getElementById('villager-name').value,
        description: document.getElementById('issue-desc').value,
        image: window.base64Image || "" // We'll convert the image to text
    };

    try {
        const response = await fetch('https://script.google.com/macros/s/AKfycbxDnEnccVFHwISeriWXy5ebs-xfqVeQVX5md_3O7EM6Lo_SUqxCTsM7hTT9YWYRqkcw/exec', {
            method: 'POST',
            body: JSON.stringify(payload)
        });
        const result = await response.json();
        
        if(result.status === "success") {
            alert("Issue submitted successfully!");
            location.reload(); // Refresh the app
        }
    } catch (error) {
        console.error("Error!", error);
        statusMsg.innerText = "Submission failed. Try again.";
    }
}
    </script>
</body>
</html>
