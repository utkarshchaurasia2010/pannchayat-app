<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panchayat Portal</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        input, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #1a73e8; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1557b0; }
        .hidden { display: none; }
        .issue-item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="card">
    <h2>Panchayat Portal</h2>

    <div id="login-section">
        <label>Enter Mobile Number</label>
        <input type="text" id="phone-number" value="+91" placeholder="+919876543210">
        <div id="recaptcha-container"></div>
        <button id="send-otp-btn">Send OTP</button>
        
        <div id="otp-input-div" class="hidden">
            <input type="text" id="otp-code" placeholder="6-digit OTP">
            <button id="verify-otp-btn">Verify & Login</button>
        </div>
    </div>

    <div id="form-section" class="hidden">
        <p>Welcome! Verified: <b id="display-phone"></b></p>
        <hr>
        <input type="text" id="villager-name" placeholder="Your Full Name">
        <textarea id="issue-desc" rows="4" placeholder="Describe your issue here..."></textarea>
        <label>Upload Photo (Optional):</label>
        <input type="file" id="issue-image" accept="image/*">
        <button id="submit-btn">Submit Issue</button>

        <hr>
        <h3>Your History</h3>
        <div id="history-container">Loading past issues...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // 1. YOUR FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyCQ4O7R2LXNfuXED13kZDHmU4sqnb-H16w", 
        authDomain: "utkarshchaurasia2010.github.io",
        projectId: "panchayat-app-1480e",
        storageBucket: "panchayat-app-1480e.appspot.com",
        messagingSenderId: "999733014760",
        appId: "1:999733014760:web:7508b68bbdc8d56a28d95d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 2. YOUR GOOGLE APPS SCRIPT URL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx6_n-raC0uVQYKG4aIar1QLeswPEfaHuRsgo9N-4W1orY7tUiw-9TE0XL-8JQV5PlL/exec"
    // --- LOGIN LOGIC ---
    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });

    document.getElementById('send-otp-btn').onclick = () => {
        const phone = document.getElementById('phone-number').value;
        signInWithPhoneNumber(auth, phone, window.recaptchaVerifier).then(confirm => {
            window.confirmationResult = confirm;
            document.getElementById('otp-input-div').classList.remove('hidden');
            alert("OTP Sent!");
        });
    };

    document.getElementById('verify-otp-btn').onclick = () => {
        const code = document.getElementById('otp-code').value;        
        window.confirmationResult.confirm(code).then(result => {
            window.currentUserPhone = result.user.phoneNumber;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('form-section').classList.remove('hidden');
            document.getElementById('display-phone').innerText = window.currentUserPhone;
            loadHistory();
        });
    };

    // --- SUBMIT LOGIC ---
    document.getElementById('submit-btn').onclick = async () => {
        const btn = document.getElementById('submit-btn');
        btn.innerText = "Submitting...";
        btn.disabled = true;

        const file = document.getElementById('issue-image').files[0];
        let base64 = "";

        if (file) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => sendData(reader.result);
        } else {
            sendData("");
        }
    };
    async function sendData(imgBase64) {
    const payload = {
        phone: window.currentUserPhone,
        name: document.getElementById('villager-name').value,
        description: document.getElementById('issue-desc').value,
        image: imgBase64
    };

    // Use a simpler fetch without no-cors first to see the real error
    fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify(payload),
        headers: {
            'Content-Type': 'text/plain;charset=utf-8', 
        },
    })
    .then(res => res.json())
    .then(data => {
        alert("Success! Issue reported.");
        location.reload();
    })
    .catch(err => {
        // If it gets here but the row appears in the sheet, it's just a browser warning
        console.log("Check your Google Sheet now!");
        alert("Submission attempt finished. Please check your sheet.");
    });
    }
</script>

</body>
</html>
